name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64, label: linux }
          - { goos: darwin, goarch: arm64, label: macOS }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -ldflags "-X main.version=${VERSION}" -o NetBird-TUI-${{ matrix.label }} ./cmd/netbird-tui
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: 'NetBird-TUI-${{ matrix.label }}'

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CURR=${{ github.ref_name }}
          NOTES=$(git log ${PREV}..${CURR} --oneline --no-merges --pretty=format:"- %s (%h)")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${CURR}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          name: NetBird-TUI ${{ github.ref_name }}
          files: dist/NetBird-TUI-*
          body: ${{ steps.notes.outputs.notes }}
          draft: true
